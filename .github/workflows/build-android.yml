name: 🤖 Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: ☕ Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: 📥 Install dependencies
        run: npm ci
      
      - name: 🏗️ Build React app
        run: npm run build
      
      - name: 🔄 Sync Capacitor
        run: npx cap sync android
      
      - name: 🛠️ Build APK (Debug)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
      
      - name: 📋 Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/nutrition-system-${{ github.run_number }}.apk
      
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nutrition-system-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/nutrition-system-*.apk
          retention-days: 30
